<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1" charset="UTF-8"/>
<title>寒心软件源</title>
<!-- 网站缩略图 + 分享图标 -->
<link rel="shortcut icon" href="./images/hanxin.png" type="image/x-icon" />
<link rel="apple-touch-icon" href="./images/hanxin.png" />
<meta property="og:image" content="https://apt.bitilly.cn/images/hanxin.png" />

<script>
addEventListener("load", function () {
setTimeout(hideURLbar, 0);
}, false);
function hideURLbar() {
window.scrollTo(0, 1);
}
</script>
<link rel="stylesheet" href="./css/style.css" type="text/css" media="all" />
<link href="css/animate.css" rel="stylesheet">
</head>
<body>
<div class="top-content-style">
<img class="rotate-img" src="./images/hanxin.png" alt=""/>
<br>
<audio id="bg-music" loop controls style="width:240px; display:block; margin:0 auto;">
    <source src="music/yylx.mp3" type="audio/mpeg">
    您的浏览器不支持音频元素。
</div>

<div class="main-bg">
<h1>Bitilly hanxin</h1>
<div class="sub-main-w3" style="text-align: center;">
<center>
<div style="margin-top: 25px; margin-bottom: 25px; margin-left: 40px; margin-right: 40px" class="row zoom animated swirlcydia">
<div class="cydiablur zoom">
<div class="cydiablur-inside">
<img onclick="location.href='cydia://url/https://cydia.saurik.com/api/share#?source=https://apt.bitilly.cn/';" src="./images/cydia.png" style="width: 60px; height: 60px" class="filter">
</div>
</div>
<div class="filter animated fadecydia" id="caption">Cydia</div>
</div>

<div style="margin-top: 25px; margin-bottom: 25px; margin-left: 40px; margin-right: 40px" class="row zoom animated swirlsileo">
<div class="sileoblur zoom">
<div class="sileoblur-inside">
<img onclick="location.href='sileo://source/https://apt.bitilly.cn/';" src="./images/sileo.png" style="width: 60px; height: 60px" class="filter">
</div>
</div>
<div class="filter animated fadesileo" id="caption">Sileo</div>
</div>

<div style="margin-top: 25px; margin-bottom: 25px; margin-left: 40px; margin-right: 40px" class="row zoom animated swirlzebra">
<div class="zebrablur zoom">
<div class="zebrablur-inside">
<img onclick="location.href='zbra://sources/add/https://apt.bitilly.cn/';" src="./images/zebra.png" style="width: 60px; height: 60px" class="filter">
</div>
</div>
<div class="filter animated fadezebra" id="caption">Zebra</div>
</div>
</center>
<br>
<br>
<p class="legend"></p>
<a href="./problems.html" id="caption">其他问题</a>
<br>
<br>
<br>
</div>
</div>

<script>
const audio = document.getElementById('bg-music');
const tracks = [
    'music/yylx.mp3',
    'music/yqlai.aac'
];
let currentTrackIndex = 0;

audio.src = tracks[currentTrackIndex];

audio.addEventListener('ended', () => {
    currentTrackIndex = (currentTrackIndex + 1) % tracks.length;
    audio.src = tracks[currentTrackIndex];
    audio.play();
});

document.addEventListener('click', function autoPlayMusic() {
    audio.play();
    document.removeEventListener('click', autoPlayMusic);
});
</script>

</body>
</html>
